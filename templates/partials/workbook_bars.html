      <section id="workbookBars" class="excel-workbook-bars" aria-label="Selected workbook bars">
        <div class="excel-workbook-bar main-workbook-bar">
          <span class="excel-workbook-label">Main file</span>
          <span id="mainWorkbookBarName" class="excel-workbook-value">-</span>
        </div>
        <div class="excel-workbook-bar reference-workbook-bar">
          <button
            id="referencePanelToggleBtn"
            type="button"
            class="action-btn action-btn-ghost action-btn-sm workbook-bar-toggle"
            aria-expanded="true"
            aria-controls="referenceViewPanel"
          >
            Collapse detail pane
          </button>
          <span class="excel-workbook-label">Detail file</span>
          <span id="referenceWorkbookBarName" class="excel-workbook-value">-</span>
        </div>
      </section>
